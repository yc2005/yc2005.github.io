name: 新订单微信推送

# 对方下单（创建订单 Issue）时自动触发
on:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  notify:
    # 只在"订单"Issue（带 sweet-order 标签）创建时才跑
    if: contains(github.event.issue.labels.*.name, 'sweet-order')
    runs-on: ubuntu-latest
    steps:
      - name: 推送到微信（PushPlus）
        env:
          ORDER_BODY: ${{ github.event.issue.body }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
        run: |
          node -e '
            const e = process.env;
            let o = {};
            try { o = JSON.parse(e.ORDER_BODY || "{}"); } catch (_) {}
            const by = o.by || "对方";
            const items = Array.isArray(o.items) ? o.items : [];
            const count = items.reduce((s, i) => s + (i.qty || 1), 0);
            const total = o.total != null ? o.total : "";
            const list = items.map(i => (i.emoji || "") + i.name + " ×" + (i.qty || 1)).join("、");
            const title = "🍽️ " + by + " 下单啦！";
            const content = (list || "有新订单") + "<br>共 " + count + " 样，合计 ¥" + total + "<br>快去 App 看看~";
            const body = { token: e.PUSHPLUS_TOKEN, title: title, content: content, template: "html" };
            if (e.PUSHPLUS_TOPIC) body.topic = e.PUSHPLUS_TOPIC;
            fetch("https://www.pushplus.plus/send", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body)
            })
              .then(r => r.json())
              .then(j => { console.log("PushPlus 返回:", JSON.stringify(j)); if (j.code !== 200) process.exit(1); })
              .catch(err => { console.error("推送失败:", err); process.exit(1); });
          '
