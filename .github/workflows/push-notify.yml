name: 新订单后台推送

# 当有人创建订单 Issue 时自动触发（订单由网页用你的 PAT 创建，会触发本工作流）
on:
  issues:
    types: [opened]

permissions:
  issues: write   # 需要读取订阅 Issue、并在订阅失效时关闭它

jobs:
  notify:
    # 只在"订单"Issue（带 sweet-order 标签）创建时才跑，其它 Issue 不触发
    if: contains(github.event.issue.labels.*.name, 'sweet-order')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 web-push
        run: npm i web-push@3

      - name: 发送推送
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ORDER_BODY: ${{ github.event.issue.body }}
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: node push-sender.js
